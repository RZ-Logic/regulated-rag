# Retrieval and refusal parameters.
#
# Threshold provenance (hour 8 honesty pass): 0.30 was chosen empirically
# during hour 5 smoke and hour 6 edge probes — the de-facto dev set. v0.1
# does not perform a formal dev/test split. Splitting N=20 into formal
# dev/test on a placeholder threshold is methodological theater. v0.2
# with a larger eval set warrants the split. See BUILD-LOG.md hour 8.

hybrid:
  vector_top_k: 20
  bm25_top_k: 20
  rrf_k_constant: 60  # standard RRF default; Cormack et al. SIGIR 2009

reranker:
  candidates: 20
  return_top_k: 5

refusal:
  # Below this top-1 reranker score, the system refuses with reason
  # LOW_RETRIEVAL_CONFIDENCE before any LLM call. Set against hour-5
  # smoke and hour-6 edge probes; revisit when corpus expands.
  rerank_score_threshold: 0.3
  refusal_message: "The corpus does not contain sufficient information to answer this question with confidence."
