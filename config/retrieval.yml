# Retrieval and refusal parameters.
# Tuned on dev set (5 queries held out from 20-query eval set).

hybrid:
  vector_top_k: 20
  bm25_top_k: 20
  rrf_k_constant: 60  # standard RRF default; Cormack et al. SIGIR 2009

reranker:
  candidates: 20
  return_top_k: 5

refusal:
  # Below this top-1 reranker score, system refuses with reason.
  # Tuned on held-out dev set; revisit when corpus expands.
  rerank_score_threshold: 0.3
  refusal_message: "The corpus does not contain sufficient information to answer this question with confidence."