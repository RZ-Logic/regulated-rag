  <g stroke="#64748B" stroke-width="0.75" fill="none">
    <path d="M 170 282 L 170 290 L 768 290 L 768 282"/>
    <path d="M 920 282 L 920 290 L 1110 290 L 1110 282"/>
  </g>
  <g font-size="11" font-weight="400" fill="#94A3B8" letter-spacing="0.3">
    <text x="469" y="308" text-anchor="middle">six deterministic stages</text>
    <text x="1015" y="308" text-anchor="middle">two deterministic checks</text>
  </g>

  <line x1="80" y1="178" x2="180" y2="178" stroke="#475569" stroke-width="0.75"/>

  <text x="80" y="332" font-size="12" font-weight="400" fill="#64748B" letter-spacing="0.2">Where is the LLM? &#8212; bounded by deterministic checks on both sides. The asymmetry is the architecture.</text>

  <text x="1200" y="332" font-size="11" font-weight="400" fill="#475569" text-anchor="end" letter-spacing="0.4">RZ-Logic / 2026</text>
